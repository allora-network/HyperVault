[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.27"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
bytecode_hash = "none"
cbor_metadata = false
fs_permissions = [
    { access = "read", path = "./deployments/configs" },
    { access = "read-write", path = "./deployments/mainnet" },
    { access = "read-write", path = "./deployments/local" },
    { access = "read", path = "./out" },
]
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@hyper-evm-lib/=lib/hyper-evm-lib/src/",
    "forge-std/=lib/forge-std/src/",
]

[profile.ci]
verbosity = 3
fuzz = { runs = 5000 }
invariant = { runs = 256, depth = 32 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"

[rpc_endpoints]
hyperevm_mainnet = "${HYPEREVM_RPC_MAINNET}"

[etherscan]
hyperevm_mainnet = { key = "${HYPEREVM_EXPLORER_KEY}", url = "${HYPEREVM_EXPLORER_URL}" }
